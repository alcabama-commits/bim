<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ArchView BIM - Visor de Planos Profesional v1.0.1</title>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;800&display=swap');
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #000000;
    }
    .font-mono { font-family: 'JetBrains Mono', monospace; }
  </style>
  <script type="module" crossorigin src="./assets/index-gq3Aee5y.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-Dwr82UEu.css">
  <link rel="stylesheet" href="./alcabama-theme.css">
</head>
<body class="bg-slate-950 theme-light">
  <div id="root"></div>
  <div class="alcabama-ui">
    <img id="alcabama-logo" class="top-left-logo" src="https://i.postimg.cc/GmWLmfZZ/Logo-transparente_negro.png" alt="Alcabama" />
    <button id="theme-toggle" class="top-right-toggle"><i class="fa-solid fa-sun"></i></button>
    <img id="bim-logo" class="bottom-left-logo" src="https://i.postimg.cc/jdyQ3Mr2/LOGO_BIM_NEGRO_ICO.png" alt="BIM" />
  </div>
  <script>
    (function(){
      const body = document.body;
      const toggle = document.getElementById('theme-toggle');
      const logo = document.getElementById('alcabama-logo');
      const bim = document.getElementById('bim-logo');
      const positionUI = () => {
        const header = document.querySelector('header');
        const rect = header ? header.getBoundingClientRect() : {left:10, right:window.innerWidth-10, top:0, height:48};
        logo.style.left = (rect.left + 12) + 'px';
        logo.style.top = (rect.top + 12) + 'px';
        toggle.style.right = '60px';
        toggle.style.top = (rect.top + 6) + 'px';
        bim.style.left = (rect.left + 12) + 'px';
      };
      const hideArchViewBrand = () => {
        const header = document.querySelector('header');
        if (!header) return;
        header.querySelectorAll('span').forEach(span => {
          const text = (span.textContent || '').toUpperCase();
          if (text.includes('ARCHVIEW') || text.includes('BIM PRO')) {
            span.style.display = 'none';
          }
        });
      };
      const hideUploadFromDevice = () => {
        const header = document.querySelector('header');
        if (header) {
          header.querySelectorAll('label,button').forEach(el => {
            const txt = (el.textContent || '').toUpperCase();
            if (txt.includes('NUEVO ARCHIVO') || txt.includes('SELECCIONAR ARCHIVO PDF')) {
              const parent = el.closest('div');
              if (parent) parent.style.display = 'none';
              el.style.display = 'none';
            }
          });
        }
        const killTexts = ['CARGAR PLANO BIM', 'SELECCIONAR ARCHIVO PDF', 'ARRASTRA TU ARCHIVO'];
        document.querySelectorAll('div, p, h1, h2, h3, span, label, button').forEach(el => {
          const txt = (el.textContent || '').toUpperCase();
          if (killTexts.some(k => txt.includes(k))) {
            const card = el.closest('div');
            if (card) {
              card.style.display = 'none';
            } else {
              el.style.display = 'none';
            }
          }
        });
      };
      const setToggleIcon = (t) => {
        const cls = t === 'dark' ? 'fa-moon' : 'fa-sun';
        toggle.innerHTML = '<i class="fa-solid ' + cls + '"></i>';
      };
      function setTheme(t){
        body.classList.remove('theme-light','theme-dark');
        body.classList.add(t === 'dark' ? 'theme-dark' : 'theme-light');
        setToggleIcon(t);
        logo.src = t === 'dark' 
          ? 'https://i.postimg.cc/0yDgcyBp/Logo-transparente_blanco.png'
          : 'https://i.postimg.cc/GmWLmfZZ/Logo-transparente_negro.png';
        bim.src = t === 'dark'
          ? 'https://i.postimg.cc/yY0XpLzW/LOGO_BIM_BLANCO_ICO.png'
          : 'https://i.postimg.cc/jdyQ3Mr2/LOGO_BIM_NEGRO_ICO.png';
        positionUI();
      }
      let mode = 'light';
      setTheme(mode);
      toggle.addEventListener('click', function(){
        mode = (mode === 'light') ? 'dark' : 'light';
        setTheme(mode);
      });
      window.addEventListener('resize', positionUI);
      const updateUI = () => {
        positionUI();
        hideArchViewBrand();
        hideUploadFromDevice();
      };
      const mo = new MutationObserver(updateUI);
      mo.observe(document.getElementById('root'), {childList:true, subtree:true});
      updateUI();
    })();
  </script>

</body>
